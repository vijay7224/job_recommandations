<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Recommendation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #1d2671, #c33764);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 520px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #1d2671;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 18px;
            color: #555;
            margin-bottom: 40px;
        }

        .upload-box {
            border: 3px dashed #c33764;
            border-radius: 16px;
            padding: 50px 30px;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .upload-box:hover {
            background: #f0f0f8;
            border-color: #1d2671;
        }

        .upload-box h3 {
            margin-bottom: 20px;
            color: #1d2671;
            font-size: 22px;
        }

        input[type="file"] {
            width: 100%;
            padding: 15px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        input[type="file"]:focus {
            outline: none;
            border-color: #c33764;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: linear-gradient(to right, #1d2671, #c33764);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(195, 55, 100, 0.35);
        }

        .info {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 35px;
            flex-wrap: wrap;
        }

        .feature {
            background: #f8f9ff;
            padding: 12px 18px;
            border-radius: 30px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Job Recommendation System</h1>
        <p class="subtitle">Upload your resume and get personalized job matches instantly</p>

        <form action="/recommend" method="POST" enctype="multipart/form-data">
            <div class="upload-box">
                <h3>📄 Upload Resume (PDF only)</h3>
                <input 
                    type="file" 
                    name="resume" 
                    accept=".pdf" 
                    required>
                
                <button type="submit">🔍 Find Best Jobs For Me</button>
            </div>
        </form>

        <div class="info">
            <p>Supported format: PDF • Max size: 10MB</p>
        </div>

        <div class="features">
            <div class="feature">✨ AI-Powered Matching</div>
            <div class="feature">📊 Skill Analysis</div>
            <div class="feature">🎯 Personalized Jobs</div>
        </div>
    </div>
</body>
</html>
