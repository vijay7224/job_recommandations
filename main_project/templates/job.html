<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SETU • Find Your Dream Job</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    :root {
      --primary: #c33764;
      --secondary: #1d2671;
      --accent: #00f0ff;
    }

    body {
      background: linear-gradient(135deg, #1d2671 0%, #c33764 100%);
      color: #f1f5f9;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 20px 0;
    }

    .navbar {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: white;
    }

    .hero-header {
      text-align: center;
      margin-bottom: 40px;
      padding: 20px 0;
    }

    .hero-header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .hero-header p {
      font-size: 1.2rem;
      opacity: 0.9;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Filter Section */
    .filter-section {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 40px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .form-control, .form-select {
      background: rgba(255,255,255,0.95);
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      color: #1d2671;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .form-control:focus {
      box-shadow: 0 0 0 4px rgba(195, 55, 100, 0.4);
      background: white;
    }

    /* Job Card */
    .job-card {
      background: white;
      color: #1e2937;
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 25px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid #e2e8f0;
      position: relative;
      overflow: hidden;
    }

    .job-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      border-color: var(--primary);
    }

    .job-card .job-title {
      font-size: 1.55rem;
      font-weight: 700;
      color: #1d2671;
      margin-bottom: 6px;
    }

    .company-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 1.1rem;
    }

    .salary {
      font-size: 1.35rem;
      font-weight: 700;
      color: #16a34a;
      margin: 12px 0 20px;
    }

    .skill-badge {
      background: linear-gradient(135deg, #c33764, #1d2671);
      color: white;
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.9rem;
      margin: 5px 6px 5px 0;
      display: inline-block;
      font-weight: 500;
    }

    .apply-btn {
      background: linear-gradient(to right, #1d2671, #c33764);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .apply-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(195, 55, 100, 0.4);
      background: linear-gradient(to right, #c33764, #1d2671);
    }

    .no-results {
      text-align: center;
      padding: 100px 20px;
      color: white;
    }

    .no-results i {
      font-size: 4rem;
      opacity: 0.6;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Navbar -->


  <!-- Header -->
  <div class="hero-header">
    <h1>Find Your Next Opportunity</h1>
    <p>Discover thousands of jobs that match your skills and aspirations</p>
  </div>

  <!-- Filters -->
  <div class="filter-section">
    <div class="row g-3">
      <div class="col-lg-6">
        <div class="input-group">
          <span class="input-group-text bg-white border-0">
            <i class="fas fa-search text-muted"></i>
          </span>
          <input id="search" type="text" class="form-control" 
                 placeholder="Search by job title, company, or skills...">
        </div>
      </div>
      <div class="col-lg-3">
        <select id="location" class="form-select">
          <option value="">All Locations</option>
          <option value="Bangalore">Bangalore</option>
          <option value="Delhi">Delhi / NCR</option>
          <option value="Hyderabad">Hyderabad</option>
          <option value="Pune">Pune</option>
          <option value="Mumbai">Mumbai</option>
        </select>
      </div>
      <div class="col-lg-3">
        <button onclick="clearFilters()" class="btn btn-light w-100 py-3 fw-semibold">
          <i class="fas fa-rotate"></i> Clear Filters
        </button>
      </div>
    </div>
  </div>

  <!-- Jobs Container -->
  <div id="jobs" class="row"></div>

</div>

<script>
let allJobs = [];

// Load jobs from backend
async function loadJobs() {
  try {
    const response = await fetch('/api/jobs');
    allJobs = await response.json();
    renderJobs();
  } catch (error) {
    console.error("Failed to load jobs:", error);
    document.getElementById('jobs').innerHTML = `
      <div class="no-results col-12">
        <i class="fas fa-wifi-slash"></i>
        <h4>Unable to load jobs</h4>
        <p>Please check your connection and try again.</p>
      </div>`;
  }
}

// Render jobs with filtering
function renderJobs() {
  const container = document.getElementById('jobs');
  container.innerHTML = '';

  const searchTerm = document.getElementById('search').value.toLowerCase().trim();
  const selectedLocation = document.getElementById('location').value;

  const filteredJobs = allJobs.filter(job => {
    const searchText = `${job["Job Title"]} ${job.Company} ${job["Skills Required"] || ''}`.toLowerCase();
    const matchesSearch = searchText.includes(searchTerm);
    const matchesLocation = !selectedLocation || job.Location === selectedLocation;
    return matchesSearch && matchesLocation;
  });

  if (filteredJobs.length === 0) {
    container.innerHTML = `
      <div class="no-results col-12">
        <i class="fas fa-search"></i>
        <h4>No jobs found</h4>
        <p>Try changing your search criteria</p>
      </div>`;
    return;
  }

  filteredJobs.forEach(job => {
    const skills = (job["Skills Required"] || "").split(",").map(s => s.trim()).filter(Boolean);

    const card = `
      <div class="col-lg-6 col-xl-4 mb-4">
        <div class="job-card h-100">
          <div class="job-title">${job["Job Title"]}</div>
          
          <div class="company-info">
            <i class="fas fa-building text-muted"></i>
            <span><strong>${job.Company}</strong></span>
          </div>

          <div class="salary">
            💰 ${job.Salary}
          </div>

          <div class="mb-4">
            ${skills.map(skill => `
              <span class="skill-badge">${skill}</span>
            `).join('')}
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <span class="text-muted">
              <i class="fas fa-map-marker-alt"></i> ${job.Location}
            </span>
            <button onclick="applyJob('${job["Job Title"]}')" class="apply-btn">
              Apply Now <i class="fas fa-arrow-right ms-2"></i>
            </button>
          </div>
        </div>
      </div>
    `;

    container.innerHTML += card;
  });
}

// Apply button action (you can connect this to backend later)
function applyJob(title) {
  alert(`Application started for: ${title}\n\nRedirecting to application form...`);
  // You can later replace this with actual routing or modal
}

// Event listeners
document.getElementById('search').addEventListener('input', renderJobs);
document.getElementById('location').addEventListener('change', renderJobs);

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('location').value = '';
  renderJobs();
}

// Initialize the page
loadJobs();
</script>

</body>
</html>
